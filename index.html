<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BREAKOUT</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a0a14;
  touch-action: none;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  color: #c8c8e8;
}
#ui {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 700px;
  padding: 6px 10px;
  font-size: 13px;
  color: #8888aa;
  flex-shrink: 0;
}
#ui b { color: #c8c8e8; }
#wrap {
  position: relative;
  flex-shrink: 0;
}
#gc {
  display: block;
  background: #0d0d1a;
  border-radius: 8px;
  border: 1px solid #1e1e3a;
  touch-action: none;
}
#msg {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  z-index: 10;
  white-space: nowrap;
}
#msg .box {
  background: rgba(10,10,20,0.93);
  padding: 14px 28px;
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  line-height: 2;
  border: 1px solid #2a2a4a;
}
#msg .sub { font-size: 11px; opacity: 0.5; }
#msg .big { font-size: 20px; font-weight: bold; }
#startBtn {
  display: none;
  margin-top: 10px;
  font-family: monospace;
  font-size: 14px;
  padding: 8px 28px;
  cursor: pointer;
  border: 1px solid #3a3a5a;
  border-radius: 6px;
  background: transparent;
  color: #c8c8e8;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
#startBtn:active { background: #1a1a2e; }
#hint {
  margin-top: 8px;
  font-size: 11px;
  opacity: 0.22;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="ui">
  <span>SKÓRE: <b id="score">0</b></span>
  <span id="lv">LEVEL 1</span>
  <span id="livesDisp">&#9679; &#9679; &#9679;</span>
</div>
<div id="wrap">
  <canvas id="gc"></canvas>
  <div id="msg"></div>
</div>
<button id="startBtn">HRÁT</button>
<div id="hint">← → nebo myš · mezerník pro start</div>

<script>
const canvas  = document.getElementById('gc');
const ctx     = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('livesDisp');
const msgEl   = document.getElementById('msg');
const lvEl    = document.getElementById('lv');
const startBtn = document.getElementById('startBtn');
const hint    = document.getElementById('hint');

const isMobile = 'ontouchstart' in window;
if (isMobile) hint.textContent = 'táhni prstem · klepni pro start';

// ── Canvas size: fill available space ─────────────
function calcSize() {
  const uiH   = document.getElementById('ui').offsetHeight;
  const btnH  = 60; // button + hint area
  const avW   = window.innerWidth;
  const avH   = window.innerHeight - uiH - btnH - 16;
  const W     = Math.min(700, avW - (isMobile ? 0 : 24));
  const H     = isMobile ? avH : Math.min(Math.round(W * 0.68), avH);
  return { W: Math.floor(W), H: Math.floor(H) };
}

const { W, H } = calcSize();
canvas.width  = W;
canvas.height = H;
canvas.style.width  = W + 'px';
canvas.style.height = H + 'px';

// ── Game constants ────────────────────────────────
const ROWS = 6, COLS = 10;
const BW   = Math.floor((W - 20) / COLS);
const BH   = Math.max(14, Math.floor(H * 0.055));
const BPAD = 3;
const PADW = Math.floor(W * 0.22);
const PADH = Math.max(10, Math.floor(H * 0.035));
const BALLR    = Math.max(6, Math.floor(W * 0.013));
const BRICKTOP = Math.floor(H * 0.1);
const PADY     = H - Math.floor(H * 0.08);

// Mobile gets slower base speed
const BASE_SPD = isMobile ? 2.2 : 3.5;
const SPD_INC  = isMobile ? 0.2 : 0.35;

const COLORS = [
  ['#e24b4a','#a32d2d'],
  ['#ef9f27','#854f0b'],
  ['#1d9e75','#0f6e56'],
  ['#378add','#185fa5'],
  ['#7f77dd','#534ab7'],
  ['#d4537e','#993556'],
];

// ── State ─────────────────────────────────────────
let score, lives, level, bricks, ball, pad, state, animId;
let keys   = { left: false, right: false };
let mouseX = -1, touchX = -1;

// ── UI helpers ────────────────────────────────────
function showMsg(title, sub, big) {
  msgEl.innerHTML =
    '<div class="box">' +
    (title ? '<div>' + title + '</div>' : '') +
    (big   ? '<div class="big">' + big + '</div>' : '') +
    (sub   ? '<div class="sub">' + sub + '</div>' : '') +
    '</div>';
}
function hideMsg() { msgEl.innerHTML = ''; }
function updateUI() {
  scoreEl.textContent = score;
  lvEl.textContent    = 'LEVEL ' + level;
  livesEl.innerHTML   = '&#9679; '.repeat(lives).trim();
}

// ── Init ──────────────────────────────────────────
function startGame() {
  startBtn.style.display = 'none';
  score = 0; lives = 3; level = 1;
  updateUI();
  initLevel();
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function initLevel() {
  bricks = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      bricks.push({
        x: 10 + c * BW + BPAD,
        y: BRICKTOP + r * (BH + BPAD),
        alive: true,
        color: COLORS[r % COLORS.length],
        pts: (ROWS - r) * 10
      });
    }
  }
  resetBall();
  state = 'ready';
  showMsg('LEVEL ' + level, isMobile ? 'klepni pro start' : 'mezerník nebo klikni');
}

function resetBall() {
  pad  = { x: W/2 - PADW/2, y: PADY, w: PADW, h: PADH };
  const spd   = BASE_SPD + level * SPD_INC;
  const angle = (Math.random() * 50 + 65) * Math.PI / 180;
  const dir   = Math.random() < 0.5 ? 1 : -1;
  ball = { x: W/2, y: PADY - BALLR - 6, vx: Math.cos(angle)*spd*dir, vy: -Math.sin(angle)*spd, r: BALLR };
}

function launch() {
  if (state === 'ready') { state = 'play'; hideMsg(); }
}

// ── Controls ──────────────────────────────────────
startBtn.addEventListener('click', startGame);
startBtn.addEventListener('touchend', e => { e.preventDefault(); startGame(); });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  touchX = -1;
});
canvas.addEventListener('click', launch);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  touchX = (e.touches[0].clientX - r.left) * (W / r.width);
  mouseX = -1;
  launch();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  touchX = (e.touches[0].clientX - r.left) * (W / r.width);
  mouseX = -1;
}, { passive: false });

canvas.addEventListener('touchend', e => { e.preventDefault(); }, { passive: false });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a') { keys.left  = true; mouseX = -1; touchX = -1; }
  if (e.key === 'ArrowRight' || e.key === 'd') { keys.right = true; mouseX = -1; touchX = -1; }
  if (e.key === ' ') { e.preventDefault(); launch(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

// ── Loop ──────────────────────────────────────────
function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── Update ────────────────────────────────────────
function update() {
  if (!pad || state === 'gameover') return;

  const padSpd = (isMobile ? 5 : 6) + level * 0.5;
  if      (touchX >= 0) pad.x = Math.max(0, Math.min(W - pad.w, touchX - pad.w/2));
  else if (mouseX >= 0) pad.x = Math.max(0, Math.min(W - pad.w, mouseX - pad.w/2));
  else {
    if (keys.left)  pad.x = Math.max(0,        pad.x - padSpd);
    if (keys.right) pad.x = Math.min(W - pad.w, pad.x + padSpd);
  }

  if (state !== 'play') return;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.x - ball.r < 0) { ball.x = ball.r;     ball.vx =  Math.abs(ball.vx); }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r < 0) { ball.y = ball.r;      ball.vy =  Math.abs(ball.vy); }

  // paddle
  if (ball.vy > 0 &&
      ball.y + ball.r > pad.y &&
      ball.y + ball.r < pad.y + pad.h + 12 &&
      ball.x > pad.x - ball.r &&
      ball.x < pad.x + pad.w + ball.r) {
    const rel = (ball.x - (pad.x + pad.w/2)) / (pad.w/2);
    const s   = Math.hypot(ball.vx, ball.vy);
    const ang = rel * 60 * Math.PI / 180;
    ball.vx = Math.sin(ang) * s;
    ball.vy = -Math.abs(Math.cos(ang) * s);
    ball.y  = pad.y - ball.r - 1;
  }

  // bottom
  if (ball.y - ball.r > H + 10) {
    lives--;
    if (lives <= 0) {
      state = 'gameover';
      updateUI();
      showMsg('KONEC HRY', isMobile ? 'klepni ZNOVU' : 'klikni ZNOVU', score + '\u00a0bodů');
      startBtn.textContent = 'ZNOVU';
      startBtn.style.display = 'inline-block';
    } else {
      updateUI();
      resetBall();
      state = 'ready';
      const w = lives === 1 ? 'život' : 'životy';
      showMsg('AU!', 'zbývá ' + lives + ' ' + w + (isMobile ? ' · klepni' : ' — mezerník nebo klik'));
    }
    return;
  }

  // bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    const bx2 = b.x + BW - BPAD*2, by2 = b.y + BH;
    if (ball.x+ball.r > b.x && ball.x-ball.r < bx2 &&
        ball.y+ball.r > b.y && ball.y-ball.r < by2) {
      b.alive = false;
      score  += b.pts;
      scoreEl.textContent = score;
      const ol = ball.x+ball.r-b.x, or2 = bx2-(ball.x-ball.r);
      const ot = ball.y+ball.r-b.y, ob  = by2-(ball.y-ball.r);
      if (Math.min(ol,or2) < Math.min(ot,ob)) ball.vx *= -1; else ball.vy *= -1;
      break;
    }
  }

  if (bricks.every(b => !b.alive)) {
    level++;
    initLevel();
    updateUI();
  }
}

// ── Draw ──────────────────────────────────────────
function rr(x, y, w, h, r) {
  if (typeof r === 'number') r = [r,r,r,r];
  ctx.beginPath();
  ctx.moveTo(x+r[0], y);
  ctx.lineTo(x+w-r[1], y); ctx.quadraticCurveTo(x+w, y, x+w, y+r[1]);
  ctx.lineTo(x+w, y+h-r[2]); ctx.quadraticCurveTo(x+w, y+h, x+w-r[2], y+h);
  ctx.lineTo(x+r[3], y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r[3]);
  ctx.lineTo(x, y+r[0]); ctx.quadraticCurveTo(x, y, x+r[0], y);
  ctx.closePath();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  if (!bricks || !ball || !pad) return;

  for (const b of bricks) {
    if (!b.alive) continue;
    const bw = BW - BPAD*2;
    ctx.fillStyle = b.color[0]; rr(b.x, b.y, bw, BH, 3); ctx.fill();
    ctx.fillStyle = b.color[1]; rr(b.x, b.y+BH-4, bw, 4, [0,0,3,3]); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.12)'; rr(b.x+2, b.y+2, bw-4, 3, 2); ctx.fill();
  }

  ctx.fillStyle = '#c8c8e8'; rr(pad.x, pad.y, pad.w, pad.h, 5); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; rr(pad.x+3, pad.y+2, pad.w-6, 3, 2); ctx.fill();

  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.beginPath(); ctx.arc(ball.x-1.5, ball.y-1.5, ball.r*0.38, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
}

// ── Boot ──────────────────────────────────────────
showMsg('BREAKOUT', isMobile ? 'klepni HRÁT pro start' : 'klikni HRÁT pro start');
startBtn.style.display = 'inline-block';
</script>
</body>
</html>
